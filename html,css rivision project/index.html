<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Petty - Pet Shop</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header id="header">
    <!-- TOP BAR - At the top -->
    <div class="header-top mt-5">
      <div class="container">
        <div class="row align-items-center py-2 justify-content-between">
          <!-- Contact -->
          <div class="col-auto d-flex gap-4">
            <div class="d-flex align-items-center gap-2">
              <div class="contact-icon"><i class="far fa-envelope"></i></div>
              <div>
                <strong class="d-block">Mail us:</strong>
                <a href="mailto:petty@support.com">petty@support.com</a>
              </div>
            </div>
            <div class="d-flex align-items-center gap-2">
              <div class="contact-icon"><i class="fas fa-phone-alt"></i></div>
              <div>
                <strong class="d-block">Call us:</strong>
                <span>(+1) 345 678 000</span>
              </div>
            </div>
          </div>

          <!-- Right -->
          <div class="col-auto d-flex align-items-center gap-3">
            <div class="d-flex gap-2">
              <a href="#" class="social-icon"><i class="fab fa-facebook-f"></i></a>
              <a href="#" class="social-icon"><i class="fab fa-twitter"></i></a>
              <a href="#" class="social-icon"><i class="fab fa-linkedin-in"></i></a>
            </div>
            <div class="d-flex gap-3">
              <a href="#" class="action-link"><i class="far fa-user-circle me-1"></i>Account</a>
              <a href="#" class="action-link"><i class="fas fa-shopping-cart me-1"></i>Cart</a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- MAIN NAV - Below header -->
    <nav class="main-nav ">
      <div class="absolute-logo-container logo-bubble">
        <a href="#" class="logo-brand " aria-label="Petty">
          <img src="https://htmlbeans.com/html/petshop/images/logo.png" alt="Petty" class="logo-img" />
          <span>Petty</span>
        </a>
      </div>

      <div class="container ">
        <div class="d-flex align-items-stretch justify-content-between w-100">
          <!-- Left Menu -->
          <ul class="nav-menu d-flex align-items-stretch m-0 p-0">
            <li><a href="#">Home</a></li>
            <li class="has-dropdown">
              <a href="#">Pages <i class="fas fa-chevron-down"></i></a>
              <ul class="dropdown-custom">
                <li><a href="#">About Us</a></li>
                <li><a href="#">Our Team</a></li>
                <li><a href="#">FAQ</a></li>
              </ul>
            </li>
            <li class="has-dropdown me-5">
              <a href="#">Shop <i class="fas fa-chevron-down"></i></a>
              <ul class="dropdown-custom">
                <li><a href="#">All Products</a></li>
                <li><a href="#">Dog Supplies</a></li>
                <li><a href="#">Cat Supplies</a></li>
              </ul>
            </li>
          </ul>

          <!-- Right Menu -->
          <ul class="nav-menu d-flex align-items-stretch ms-5 p-0">
            <li><a href="#">Blog</a></li>
            <li><a href="#">Contact Us</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>
</body>

</html>
